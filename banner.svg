<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0c0714"/>
    </linearGradient>

    <!-- Neon Violet Gradient -->
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-violet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 46px;
        fill: url(#violet-grad);
        filter: url(#glow-violet);
        animation: pulseGlow 4s ease-in-out infinite;
      }
      
      .subtitle {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        fill: #06b6d4;
        filter: url(#glow-cyan);
        letter-spacing: 4px;
        animation: typing 6s steps(30, end) infinite;
        white-space: nowrap;
      }

      .symbol {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 50px;
        fill: #3b82f6;
        opacity: 0.8;
      }

      .grid-line {
        stroke: #2e1065;
        stroke-width: 1;
        opacity: 0.3;
      }

      .animated-grid-h {
        animation: gridMoveH 8s linear infinite;
      }

      .animated-grid-v {
        animation: gridMoveV 8s linear infinite;
      }

      /* Cyber dots animation */
      .dust {
        fill: #ec4899;
        opacity: 0.6;
        animation: floatDust 5s ease-in-out infinite;
      }

      .dust-cyan {
        fill: #06b6d4;
        opacity: 0.6;
        animation: floatDust 7s ease-in-out infinite;
      }

      /* Keyframe animations */
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.4)); }
        50% { filter: drop-shadow(0 0 25px rgba(236, 72, 153, 0.8)); }
      }

      @keyframes gridMoveH {
        0% { transform: translateY(0px); }
        100% { transform: translateY(40px); }
      }

      @keyframes gridMoveV {
        0% { transform: translateX(0px); }
        100% { transform: translateX(40px); }
      }

      @keyframes floatDust {
        0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
        50% { transform: translateY(-15px) translateX(10px) scale(1.3); opacity: 0.8; }
      }

      /* Code Brackets blinking */
      .bracket {
        animation: blink 2.5s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; filter: drop-shadow(0 0 8px #06b6d4); }
      }
    </style>
  </defs>

  <!-- Banner Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16"/>

  <!-- Animated Cyber Grid Background -->
  <g>
    <!-- Horizontal Grid Lines -->
    <g class="animated-grid-h">
      <line x1="0" y1="-40" x2="800" y2="-40" class="grid-line" />
      <line x1="0" y1="0" x2="800" y2="0" class="grid-line" />
      <line x1="0" y1="40" x2="800" y2="40" class="grid-line" />
      <line x1="0" y1="80" x2="800" y2="80" class="grid-line" />
      <line x1="0" y1="120" x2="800" y2="120" class="grid-line" />
      <line x1="0" y1="160" x2="800" y2="160" class="grid-line" />
      <line x1="0" y1="200" x2="800" y2="200" class="grid-line" />
      <line x1="0" y1="240" x2="800" y2="240" class="grid-line" />
      <line x1="0" y1="280" x2="800" y2="280" class="grid-line" />
    </g>
    <!-- Vertical Grid Lines -->
    <g class="animated-grid-v">
      <line x1="-40" y1="0" x2="-40" y2="240" class="grid-line" />
      <line x1="0" y1="0" x2="0" y2="240" class="grid-line" />
      <line x1="40" y1="0" x2="40" y2="240" class="grid-line" />
      <line x1="80" y1="0" x2="80" y2="240" class="grid-line" />
      <line x1="120" y1="0" x2="120" y2="240" class="grid-line" />
      <line x1="160" y1="0" x2="160" y2="240" class="grid-line" />
      <line x1="200" y1="0" x2="200" y2="240" class="grid-line" />
      <line x1="240" y1="0" x2="240" y2="240" class="grid-line" />
      <line x1="280" y1="0" x2="280" y2="240" class="grid-line" />
      <line x1="320" y1="0" x2="320" y2="240" class="grid-line" />
      <line x1="360" y1="0" x2="360" y2="240" class="grid-line" />
      <line x1="400" y1="0" x2="400" y2="240" class="grid-line" />
      <line x1="440" y1="0" x2="440" y2="240" class="grid-line" />
      <line x1="480" y1="0" x2="480" y2="240" class="grid-line" />
      <line x1="520" y1="0" x2="520" y2="240" class="grid-line" />
      <line x1="560" y1="0" x2="560" y2="240" class="grid-line" />
      <line x1="600" y1="0" x2="600" y2="240" class="grid-line" />
      <line x1="640" y1="0" x2="640" y2="240" class="grid-line" />
      <line x1="680" y1="0" x2="680" y2="240" class="grid-line" />
      <line x1="720" y1="0" x2="720" y2="240" class="grid-line" />
      <line x1="760" y1="0" x2="760" y2="240" class="grid-line" />
      <line x1="800" y1="0" x2="800" y2="240" class="grid-line" />
      <line x1="840" y1="0" x2="840" y2="240" class="grid-line" />
    </g>
  </g>

  <!-- Decorative Border Frame -->
  <rect x="10" y="10" width="780" height="220" fill="none" stroke="#2e1065" stroke-width="1.5" rx="12"/>
  <rect x="15" y="15" width="770" height="210" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="10 30" rx="10" opacity="0.4"/>

  <!-- Floating Ambient Particles -->
  <circle cx="100" cy="80" r="3" class="dust" />
  <circle cx="220" cy="180" r="2" class="dust-cyan" style="animation-delay: 1.5s;" />
  <circle cx="480" cy="60" r="4" class="dust" style="animation-delay: 2.5s;" />
  <circle cx="680" cy="190" r="1.5" class="dust-cyan" style="animation-delay: 0.5s;" />
  <circle cx="710" cy="70" r="3" class="dust" style="animation-delay: 3.5s;" />

  <!-- Code Decorative Symbols -->
  <text x="50" y="135" class="symbol bracket">&lt;</text>
  <text x="715" y="135" class="symbol bracket">&gt;</text>

  <!-- Center Content -->
  <g transform="translate(100, 0)">
    <!-- Title: CodeDemon777 -->
    <text x="300" y="115" text-anchor="middle" class="title">CodeDemon777</text>
    
    <!-- Subtitle: Full Stack Developer -->
    <text x="300" y="160" text-anchor="middle" class="subtitle">FULL STACK SOFTWARE ENGINEER</text>
  </g>

  <!-- Status indicators -->
  <g transform="translate(680, 30)">
    <circle cx="0" cy="0" r="4" fill="#10b981" />
    <text x="12" y="4" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ca3af" font-weight="500">SYSTEMS: ONLINE</text>
  </g>
</svg>
